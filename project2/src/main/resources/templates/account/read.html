<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title>Edgecut</title>
    <link th:href="@{/css/bootstrap.css}" rel="stylesheet" />
<link
	href="https://fonts.googleapis.com/css?family=Poppins:400,600,700&display=swap"
	rel="stylesheet" />
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Font Awesome style -->
<link rel="stylesheet" type="text/css"
	th:href="@{/css/font-awesome.min.css}" />

<!-- Custom styles for this template -->
<link rel="stylesheet" type="text/css" th:href="@{/css/style.css}" />

<!-- Responsive style -->
<link rel="stylesheet" type="text/css" th:href="@{/css/responsive.css}" />
<link rel="stylesheet" th:href="@{/css/account/read.css}" />
<link rel="stylesheet" th:href="@{/css/account/list.css}" />
   
</head>
<body>
    <header class="header_section long_section px-0">
		<nav class="navbar navbar-expand-lg custom_nav-container ">
			<a class="navbar-brand" href="/index.html"> <span> Edgecut
			</span>
			</a>
			<button class="navbar-toggler" type="button" data-toggle="collapse"
				data-target="#navbarSupportedContent"
				aria-controls="navbarSupportedContent" aria-expanded="false"
				aria-label="Toggle navigation">
				<span class=""> </span>
			</button>

			<div class="collapse navbar-collapse" id="navbarSupportedContent">
					<div class="d-flex mx-auto flex-column flex-lg-row align-items-center">
						<ul class="navbar-nav  ">
							<li class="nav-item ">
								<a class="nav-link" href="/index.html">Home<span class="sr-only">(current)</span></a>
							</li>
							<li class="nav-item">
								<a href="/market/access" class="nav-link">Region Market</a>
							</li>
							<li class="nav-item active">
								<a class="nav-link"	href="/shop/list">Shopping Mall</a>
							</li>
							<li class="nav-item">
                				<a class="nav-link" href="/account/list">Account</a>
							</li>
						</ul>
				</div>
				<div class="quote_btn-container">
				    <span style="color: black; margin-right: 15px;">
				        <i class="fa fa-user" aria-hidden="true"></i>
				        <span sec:authentication="name"></span>
				    </span>
				    <div class="d-flex flex-column">
				        <a th:href="@{/logout}" class="btn btn-outline-info mb-2" style="color: #6bb7be; border-color: #6bb7be;">
				            <i class="fa fa-sign-out" aria-hidden="true"></i>
				            <span>Logout</span>
				        </a>
				    </div>
				</div>
			</div>
		</nav>
	</header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <!-- Card for Account Details -->
                <div class="card mb-4">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>계좌 상세정보</span>
                        <a th:href="|@{/account/list}|"
                           class="btn btn-primary">
                            <i class="fa fa-arrow-left me-2"></i>Back to List
                        </a>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <strong>계좌번호:</strong>
                            <span th:text="${accountDTO.accountId}"></span>
                        </div>
                        <div class="mb-3">
                            <strong>개설일:</strong>
                            <span th:text="${#temporals.format(accountDTO.createDate, 'yyyy-MM-dd')}"></span>
                        </div>
                        <div class="mb-3">
                            <strong>잔액:</strong>
                            <span th:text="${#numbers.formatInteger(accountDTO.balance, 1, 'COMMA')}"></span>
                        </div>
                        <div class="text-end">
                            <button class="btn btn-info addTransferBtn">
                                <i class="fa fa-exchange"></i> 송금하기
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Card for Transactions -->
                <div class="card">
                    <div class="card-header">
                        <strong>입출금 내역</strong>
                    </div>
                    <div class="card-body">
                       	<div class="d-flex bg-light p-2 border text-center">
				            <div class="flex-fill" style="max-width: 20%;">거래번호</div>
				            <div class="flex-fill" style="max-width: 20%;">거래구분</div>
				            <div class="flex-fill" style="max-width: 20%;">거래계좌</div>
				            <div class="flex-fill" style="max-width: 20%;">거래금액</div>
				            <div class="flex-fill" style="max-width: 20%;">거래일시</div>
        			   	</div>
                        <ul class="list-group mt-3 transferList">
                            <!-- Dynamic transaction rows -->
                        </ul>
                    </div>
                    <div class="card-footer text-center">
                        <ul class="pagination transferPaging"></ul>
                    </div>
                </div>
            </div>
        </div>
    </main>

  <div class="modal transferModal" tabindex="-1">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title">이체</h5>
				</div>
				<div class="modal-body">
					<div class="input-group mb-3">
						<span class="input-group-text">계좌번호</span> <input type="text"
							class="form-control senderAccountId" id="senderAccountId"
							name="senderAccountId" th:value="${accountDTO.accountId}"
							readonly />
					</div>
					<div class="input-group mb-3">
						<span class="input-group-text">이체할계좌</span> <input type="text"
							class="form-control receiverAccountId" id="receiverAccountId"
							name="receiverAccountId" />
					</div>
					<div class="input-group mb-3">
						<span class="input-group-text">이체금액</span> <input type="text"
							class="form-control transferAmount" id="transferAmount"
							name="transferAmount" />
					</div>
				</div>
				<div class="modal-footer">
					<button type="button" class="btn btn-info transferBtn">이체</button>
					<button type="button" class="btn btn-outline-dark closeTransferBtn">닫기</button>
				</div>
			</div>
		</div>
	</div>
            
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
	<script src="/js/transfer.js"></script>
</div>

    
<script th:inline="javascript">
    // 현재 계좌의 ID를 Thymeleaf를 통해 가져옴
    const accountId = /*[[${accountDTO.accountId}]]*/'';
    
    const transferList = document.querySelector('.transferList');
    const transferPaging = document.querySelector('.transferPaging');

    function printList(dtoList) {
        let str = '';
        if (dtoList && dtoList.length > 0) {
            for (const dto of dtoList) {
                const transferDate = new Date(dto.transferDate).toISOString().split('T')[0];
                const amount = dto.transferAmount.toLocaleString();
                const amountColor = dto.transactionType === '출금' ? 'text-danger' : 'text-primary';
                
                str += `<li class="list-group-item d-flex text-center">
                            <div class="flex-fill" style="max-width: 20%;">${dto.accountHistoryId}</div>
                            <div class="flex-fill" style="max-width: 20%;">${dto.transactionType}</div>
                            <div class="flex-fill" style="max-width: 20%;">${dto.transferTarget}</div>
                            <div class="flex-fill ${amountColor}" style="max-width: 20%;">${amount}원</div>
                            <div class="flex-fill" style="max-width: 20%;">${transferDate}</div>
                        </li>`;
            }
        } else {
            str = `<li class="list-group-item text-center">이체 내역이 없습니다.</li>`;
        }
        transferList.innerHTML = str;
    }

    function printPage(data) {
        let pageStr = '';
        const total = data.total;
        const page = data.page;
        const size = data.size;
        const totalPages = Math.ceil(total / size);
        
        // 이전 페이지
        if (page > 1) {
            pageStr += `<li class="page-item">
                           <a class="page-link" data-page="${page - 1}">이전</a>
                       </li>`;
        }
        
        // 페이지 번호
        for (let i = 1; i <= totalPages; i++) {
            pageStr += `<li class="page-item ${i === page ? 'active' : ''}">
                           <a class="page-link" data-page="${i}">${i}</a>
                       </li>`;
        }
        
        // 다음 페이지
        if (page < totalPages) {
            pageStr += `<li class="page-item">
                           <a class="page-link" data-page="${page + 1}">다음</a>
                       </li>`;
        }
        
        if(transferPaging) {
            transferPaging.innerHTML = pageStr;
        }
    }

    // 초기 데이터 로드
    async function loadInitialData() {
        try {
            const data = await getList({
                accountId: accountId,
                page: 1,
                size: 10
            });
            
            if(data.dtoList) {
                printList(data.dtoList);
                printPage(data);
            }
        } catch (error) {
            console.error("Failed to load initial data:", error);
        }
    }

    // 페이지 로드시 초기 데이터 로드
    document.addEventListener('DOMContentLoaded', loadInitialData);

    // 페이징 이벤트 처리
    if(transferPaging) {
        transferPaging.addEventListener('click', async function (e) {
            e.preventDefault();
            if (e.target.tagName === 'A') {
                const page = parseInt(e.target.getAttribute('data-page'));
                const data = await getList({
                    accountId: accountId,
                    page: page,
                    size: 10
                });
                
                if(data.dtoList) {
                    printList(data.dtoList);
                    printPage(data);
                }
            }
        });
    }
    
 // 이체 (모달창)
    const transferModal = new bootstrap.Modal(document.querySelector('.transferModal'))
    const transferBtn = document.querySelector('.transferBtn')
    const senderAccountId = document.querySelector('.senderAccountId')
    const receiverAccountId = document.querySelector('.receiverAccountId')
    const transferAmount = document.querySelector('.transferAmount')
    const closeTransferBtn = document.querySelector('.closeTransferBtn')

    document.querySelector('.addTransferBtn').addEventListener('click', function () {
        transferModal.show()
    }, false)

    closeTransferBtn.addEventListener('click', function () {
        transferModal.hide()
    }, false)

    transferBtn.addEventListener('click', function () {
        const transferObj = {
        	senderAccountId: senderAccountId.value,
        	receiverAccountId: receiverAccountId.value,
            transferAmount: transferAmount.value
        }

        addTransfer(transferObj)
        .then(result => {
            alert("이체가 성공되었습니다!!");
            transferModal.hide();
            senderAccountId.value = '';
            receiverAccountId.value = '';
            transferAmount.value = '';
            printTransfer(1, 10);
        })
    })
</script>
</body>
</html>
