<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
<h1>Proto Shop/read</h1>

<table border="1">
   <tr>
       <th>번호</th>
       <td>[[${dto.bno}]]</td>
   </tr>
   <tr>
       <th>제목</th>
       <td>[[${dto.board_title}]]</td>
   </tr>
   <tr>
       <th>상품코드</th>
       <td>[[${dto.product_code}]]</td>
   </tr>
   <tr>
       <th>가격</th>
       <td>[[${dto.product_price}]]</td>
   </tr>
   <tr>
       <th>카테고리</th>
       <td>[[${dto.product_category}]]</td>
   </tr>
   <tr>
       <th>재고</th>
       <td>[[${dto.product_stock}]]</td>
   </tr>
   <tr>
       <th>내용1</th>
       <td>[[${dto.board_content1}]]</td>
   </tr>
   <tr>
       <th>내용2</th>
       <td>[[${dto.board_content2}]]</td>
   </tr>
</table>

<!-- 버튼 그룹 -->
<div>
   <a th:href="@{/protoshop/modify(bno=${dto.bno})}">
       <button type="button">수정</button>
   </a>
   
   <form action="/protoshop/remove" method="post" style="display: inline;">
       <input type="hidden" name="bno" th:value="${dto.bno}">
       <button type="submit">삭제</button>
   </form>
   
   <a th:href="@{/protoshop/list}">
       <button type="button">목록</button>
   </a>
</div>

</body>
</html>
