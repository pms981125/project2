<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
		xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
<meta charset="UTF-8">
<title>Proto Shop/modify</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
	<h1>Proto Shop/modify</h1>

	<div style="margin: 20px 0;">
			<img th:if="${dto.thumbnail_path != null}"
				th:src="@{/display(filename=${dto.thumbnail_path})}"
				style="max-width: 500px; height: auto;">
		</div>

	<div>
		<label>상품 코드</label>
		<input type="text" id="search_product_code" placeholder="상품 코드">
		<button type="button" onclick="searchProduct()">상품 조회</button>
	</div>

	<form id="modifyForm" action="/protoshop/modify" method="post" enctype="multipart/form-data" onreset="resetForm()">

		<input type="hidden" name="bno" th:value="${dto.bno}">
		<input type="hidden" name="product_code" id="product_code" th:value="${dto.product_code}">
		
		<table border="1">
			<tr>
				<th>번호</th>
				<td>[[${dto.bno}]]</td>
			</tr>
			<tr>
				<th>제목</th>
				<td><input type="text" name="board_title" id="board_title" th:value="${dto.board_title}" readonly></td>
			</tr>
			<tr>
				<th>상품 코드</th>
				<td><span id="product_code_display">[[${dto.product_code}]]</span></td>
			</tr>
			<tr>
				<th>가격</th>
				<td><input type="number" name="product_price" id="product_price" th:value="${dto.product_price}"></td>
			</tr>
			<tr>
				<th>카테고리</th>
				<td><input type="text" name="product_category" id="product_category" th:value="${dto.product_category}" readonly></td>
			</tr>
			<tr>
				<th>재고</th>
				<td><input type="number" name="product_stock" id="product_stock" th:value="${dto.product_stock}" readonly></td>
			</tr>
			<tr>
				<th>내용1</th>
				<td><textarea name="board_content1" id="board_content1">[[${dto.board_content1}]]</textarea></td>
			</tr>
			<tr>
				<th>내용2</th>
				<td><textarea name="board_content2" id="board_content2">[[${dto.board_content2}]]</textarea></td>
			</tr>
		</table>

		<div sec:authorize="hasRole('MANAGER')" style="margin: 20px 0;">
			<label>상품 이미지:</label>
			<input type="file"
					id = "productImages"
					name="productImages" 
					multiple
					accept="image/*"
					onchange="previewImages(this)">
			<p style="color: gray; font-size: 0.9em;">* 첫 번째 업로드되는 이미지가 대표 이미지로 설정됩니다.</p>
		</div>

		<!-- 기존 이미지 표시 영역 -->
		<div sec:authorize="hasRole('MANAGER')" style="margin: 20px 0;">
		    <label>기존 이미지:</label>
		    <div id="existingImagesContainer">
		        <!-- CHANGED: 수정된 부분 -->
		        <th:block th:if="${productImages != null and !productImages.isEmpty()}">
		            <th:block th:each="image : ${productImages}">
		                <div style="display: inline-block; margin: 10px; position: relative;">
		                    <img th:src="@{/display(filename=${image.thumbnail_path})}" 
		                         style="max-width: 200px; max-height: 200px; object-fit: cover;">
		                    <button type="button"
		                    	th:data-image-id="${image.img_id}"
        						onclick="removeExistingImage(this, this.getAttribute('data-image-id'))"
        						style="position: absolute;
        						top: 0;
        						right: 0;
        						background-color: red;
        						color: white; border:
        						none; border-radius: 50%;
        						cursor: pointer;">
    							&times;
							</button>
		                </div>
		            </th:block>
		        </th:block>
		        <!-- CHANGED: 이미지가 없을 경우 메시지 -->
		        <th:block th:if="${productImages == null or productImages.isEmpty()}">
		            <p>등록된 이미지가 없습니다.</p>
		        </th:block>
		    </div>
		</div>

		<!-- 이미지 미리보기 컨테이너 -->
		<div id="imagePreviewContainer">
    	<!-- 미리보기 이미지가 여기에 동적으로 추가됩니다 -->
		</div>
		
		<div>
			<button type="submit">수정 완료</button>
			<a th:href="@{/protoshop/read(bno=${dto.bno})}">
				<button type="button">취소</button>
				</a>
			<a th:href="@{/protoshop/list}">
				<button type="button">목록</button>
				</a>
		</div>
	</form>

	<script>
		// 페이지 로드 시 에러 메시지 확인
		document.addEventListener('DOMContentLoaded', function() {
			// Thymeleaf로 전달된 에러 메시지 확인
			const errorMessage = '[[${error}]]';
			if (errorMessage && errorMessage.trim() !== '') {
				alert(errorMessage);
			}
		});
		function searchProduct() {
			const productCode = document.getElementById('search_product_code').value;

			$.ajax({
				url : '/api/product/' + productCode,
				method : 'GET',
				success : function(product) {
					document.getElementById('product_code').value = product.product_code;
					document.getElementById('product_code_display').textContent = product.product_code;
					document.getElementById('board_title').value = product.product_name;
					document.getElementById('product_price').value = product.product_price;
					document.getElementById('product_category').value = product.product_category;
					document.getElementById('product_stock').value = product.product_stock;
					document.getElementById('board_content1').value = product.product_detail1;
					document.getElementById('board_content2').value = product.product_detail2;
				},
				error : function() {
					alert('상품을 찾을 수 없습니다.');
				}
			});
		}
		
		// 이미지 미리보기 함수
		function previewImages(input) {
		    const previewContainer = document.getElementById('imagePreviewContainer');
		    previewContainer.innerHTML = ''; // 기존 미리보기 초기화

		    if (input.files) {
		        Array.from(input.files).forEach(file => {
		            const reader = new FileReader();
		            
		            reader.onload = function(e) {
		                const imgWrapper = document.createElement('div');
		                imgWrapper.style.display = 'inline-block';
		                imgWrapper.style.margin = '5px';
		                imgWrapper.style.position = 'relative';

		                const img = document.createElement('img');
		                img.src = e.target.result;
		                img.style.maxWidth = '150px';
		                img.style.maxHeight = '150px';
		                img.style.objectFit = 'cover';

		                const removeBtn = document.createElement('button');
		                removeBtn.innerHTML = '&times;';
		                removeBtn.style.position = 'absolute';
		                removeBtn.style.top = '0';
		                removeBtn.style.right = '0';
		                removeBtn.style.backgroundColor = 'red';
		                removeBtn.style.color = 'white';
		                removeBtn.style.border = 'none';
		                removeBtn.style.borderRadius = '50%';
		                removeBtn.style.cursor = 'pointer';
		                removeBtn.onclick = function() {
		                    imgWrapper.remove();
		                    // 파일 input의 파일 목록에서도 제거
		                    const fileInput = document.getElementById('productImages');
		                    const fileList = Array.from(fileInput.files);
		                    const index = fileList.findIndex(f => f.name === file.name);
		                    if (index > -1) {
		                        fileList.splice(index, 1);
		                        const newFileList = new DataTransfer();
		                        fileList.forEach(f => newFileList.items.add(f));
		                        fileInput.files = newFileList.files;
		                    }
		                };

		                imgWrapper.appendChild(img);
		                imgWrapper.appendChild(removeBtn);
		                previewContainer.appendChild(imgWrapper);
		            }

		            reader.readAsDataURL(file);
		        });
		    }
		}

		// 기존 이미지 삭제 함수
		function removeExistingImage(btn, imageId) {
			console.log('#########################################Attempting to delete image:', imageId); // 콘솔 로그 추가
			
			if(confirm('이 이미지를 삭제하겠습니까?')){
				const productCode = document.getElementById('product_code').value;
				
				fetch('/protoshop/deleteImage', {
					method: 'POST',
					headers: {
						'Content-Type': 'application/x-www-form-urlencoded',
					},
					body: `imageId=${imageId}&productCode=${productCode}`
				})
				.then(response => {
					console.log('$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$$Delete response:', response); // 응답 로그 추가
					
					if (response.ok){
						btn.closest('div').remove();
						alert('이미지가 삭제되었습니다.');
					} else {
						console.error('Delete failed'); // 에러 로그 추가
						alert('이미지 삭제에 실패했습니다.');
					}
				})
				.catch(error => {
					console.error('Error', error);
					alert('이미지 삭제 중 오류가 발생했습니다.');
				})
			}
		}
		
	</script>
</body>
</html>
