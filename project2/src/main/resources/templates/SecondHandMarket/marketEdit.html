<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 수정</title>
</head>
<body>
    <h1>게시글 수정</h1>

    <form th:action="@{/market/edit/{postId}(postId=${post.postId})}" method="post">
        <label for="title">제목:</label>
        <input type="text" id="title" name="title" th:value="${post.title}" required>
        <br>

        <label for="content">내용:</label>
        <textarea id="content" name="content" th:text="${post.content}" required></textarea>
        <br>

        <label for="price">가격:</label>
        <input type="number" id="price" name="price" th:value="${post.price}" required>
        <br>

        <label for="region">지역:</label>
        <input type="text" id="region" name="region" th:value="${post.region}" required>
        <br>

        <button type="submit">수정하기</button>
    </form>

    <br>
    <button onclick="window.history.back()">뒤로가기</button>
</body>
</html>
