<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    
    <!-- Site Metas -->
    <link rel="icon" href="images/fevicon.png" type="image/gif" />
    <meta name="keywords" content="" />
    <meta name="description" content="" />
    <meta name="author" content="" />

    <title>Edgecut - Payment</title>

    <!-- bootstrap core css -->
    <link rel="stylesheet" type="text/css" href="/css/bootstrap.css" />
    <link href="https://fonts.googleapis.com/css?family=Poppins:400,600,700&display=swap" rel="stylesheet" />
    <link href="/css/font-awesome.min.css" rel="stylesheet" />
    <link href="/css/style.css" rel="stylesheet" />
    <link href="/css/responsive.css" rel="stylesheet" />
</head>

<body class="sub_page">
    <div class="hero_area">
        <!-- header section strats -->
        <header class="header_section long_section px-0">
            <!-- Same navigation bar as cart list -->
            [Your navigation bar code here]
        </header>
    </div>

    <!-- payment section -->
    <section class="shop_section layout_padding px-5">
        <div class="container-fluid px-5">
        
         <form th:action="@{/cart/order/submit}" method="post" onsubmit="return validateForm()">
            <!-- 총 금액을 hidden으로 전달 -->
            <input type="hidden" name="total_amount" th:value="${totalPrice}">         
         
            <div class="heading_container mb-4">
                <h2>주문하기</h2>
            </div>

            <div class="row">
                <!-- Left Column - Customer Information -->
                <div class="col-md-6">
                    <div class="card mb-4">
                        <div class="card-body">
                            <h4 class="card-title mb-4">주문자 정보</h4>
                            
                            <!-- Customer ID from Cart -->
                            <div class="mb-3">
                                <label class="form-label">주문자 ID</label>
                                <input type="text" class="form-control" th:value="${member.id}" readonly>
                            </div>

                            <!-- Name Input -->
                            <div class="mb-3">
                                <label class="form-label">이름</label>
                                <input type="text" class="form-control" name="customerName"
                                		th:value="${member.name}" required>
                            </div>

                            <!-- Phone Number Input -->
                            <div class="mb-3">
                                <label class="form-label">연락처</label>
                                <input type="tel" class="form-control" name="phoneNumber"
										th:value="${member.phone}" 
                                       pattern="[0-9]{3}-[0-9]{4}-[0-9]{4}" 
                                       placeholder="000-0000-0000" required>
                            </div>

                            <!-- Address Input -->
                            <div class="mb-3">
                                <label class="form-label">배송 주소</label>
                                <input type="text" class="form-control mb-2" name="address1" 
                                		th:value="${member.location}"placeholder="기본주소" required>
                                <input type="text" class="form-control" name="address2" 
                                		th:value="${member.address}"placeholder="상세주소" required>
                            </div>

                            <!-- Special Requests -->
                            <div class="mb-3">
                                <label class="form-label">배송 요청사항</label>
                                <textarea class="form-control" name="specialRequests" rows="3" 
                                          placeholder="배송 시 요청사항을 입력해주세요"></textarea>
                            </div>
                        </div>
                    </div>
                </div>

				<!-- Right Column - Order Summary -->
				<div class="col-md-6">
				    <div class="card mb-4">
				        <div class="card-body">
				            <h4 class="card-title mb-4">주문 상품 정보</h4>
				            
				            <!-- Cart Items List -->
				            <div class="cart-items">
				                <div th:each="item : ${responseDTO.dtoList}" class="cart-item card mb-3">
				                    <div class="card-body d-flex align-items-center p-3">
				                        <div class="item-image me-4" style="width: 80px;">
				                            <img th:if="${item.thumbnail_path != null}"
				                                 th:src="@{/display(filename=${item.thumbnail_path})}"
				                                 class="img-fluid rounded"
				                                 style="max-width: 70px; height: auto;">
				                            <span th:if="${item.thumbnail_path == null}" class="text-muted">No Image</span>
				                        </div>
				                        
				                        <div class="item-details flex-grow-1">
				                            <h6 class="card-title mb-1">[[${item.product_name}]]</h6>
				                            <div class="d-flex justify-content-between">
				                                <span class="text-muted small">수량: [[${item.count}]]개</span>
				                                <span class="fw-bold">[[${#numbers.formatInteger(item.total_price, 0, 'COMMA')}]]원</span>
				                            </div>
				                        </div>
				                    </div>
				                </div>
				            </div>
				
				            <!-- Total Amount -->
				            <div class="card bg-light mt-4">
				                <div class="card-body">
				                    <div class="d-flex justify-content-between align-items-center">
				                        <h5 class="mb-0">총 주문금액</h5>
				                        <h4 class="mb-0 text-primary">
				                            [[${#numbers.formatInteger(totalPrice, 0, 'COMMA')}]]원
				                        </h4>
				                    </div>
				                </div>
				            </div>
				
				            <!-- Order Buttons -->
						    <div class="d-flex justify-content-between mt-4">
						        <a th:href="@{/cart/list}" class="btn btn-outline-secondary btn-lg">
						            <i class="fa fa-arrow-left"></i> 장바구니로 돌아가기
						        </a>
				                <button type="submit" class="btn btn-primary btn-lg">
				                    <i class="fa fa-check-circle"></i> 주문 완료하기
				                </button>
				            </div>
				        </div>
				    </div>
				</div>
            </div>
            </form>
        </div>
    </section>

    <!-- footer section -->
    <footer class="footer_section">
        <div class="container">
            <p>&copy; <span id="displayYear"></span> All Rights Reserved By <a href="https://html.design/">Free Html Templates</a></p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="/js/jquery-3.4.1.min.js"></script>
    <script src="/js/bootstrap.js"></script>
    <script src="/js/custom.js"></script>

<script>
function validateForm() {
    if (confirm('입력하신 정보로 주문하시겠습니까?')) {
        return true;
    }
    return false;
}
</script>
</body>
</html>
