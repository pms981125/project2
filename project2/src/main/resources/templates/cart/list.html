<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Cart/list</title>
</head>
<body>

<h1>Cart/list</h1>

<div>
    접속 ID: <strong th:text="${memberId}"></strong>
    총 결제금액: <strong th:text="${#numbers.formatInteger(totalPrice, 0, 'COMMA')}">0</strong>원
    <a th:href="@{/logout}"><button>로그아웃</button></a>
</div>

<table border="1">
   <thead>
       <tr>
           <th>상품명</th>
           <th>수량</th>
           <th>가격</th>
           <th>총 가격</th>
           <th>상품 제거</th>
       </tr>
   </thead>
   <tbody>
       <tr th:each="item : ${responseDTO.dtoList}">
           <input type="hidden" th:value="${item.id}" />
           <input type="hidden" th:value="${item.product_code}" />
           <td>
               <a th:href="@{/cart/read(id=${item.id})}">[[${item.product_name}]]</a>
           </td>
           <td>[[${item.count}]]</td>
           <td>[[${#numbers.formatInteger(item.price, 0, 'COMMA')}]]원</td>
           <td>[[${#numbers.formatInteger(item.total_price, 0, 'COMMA')}]]원</td>
           <td>
               <form th:action="@{/cart/remove}" method="post" style="display: inline;">
                   <input type="hidden" name="id" th:value="${item.id}">
                   <button type="submit" onclick="return confirm('이 항목을 삭제하시겠습니까?')">삭제</button>
               </form>
           </td>
       </tr>
   </tbody>
</table>

<div>
    <p>장바구니 총액: <span th:text="${totalPrice}">0</span>원</p>
</div>

<!-- 페이징 추가 -->
<div th:with="start=${responseDTO.start}, end=${responseDTO.end}">
   <ul th:if="${start != null && end != null}">
       <li th:if="${responseDTO.prev}">
           <a th:href="@{/cart/list(page=${start - 1})}">이전</a>
       </li>
       
       <li th:each="num : ${#numbers.sequence(start, end)}">
           <a th:href="@{/cart/list(page=${num})}" 
              th:text="${num}"
              th:class="${responseDTO.page == num} ? 'active' : ''">
           </a>
       </li>
       
       <li th:if="${responseDTO.next}">
           <a th:href="@{/cart/list(page=${end + 1})}">다음</a>
       </li>
   </ul>
</div>

<div>
    <a th:href="@{/protoshop/list}"><button type="button">쇼핑 계속하기</button></a>
    <button type="button" onclick="clearCart()">장바구니 비우기</button>
</div>

<script>
function clearCart() {
    if(confirm('장바구니를 비우시겠습니까?')) {
        // AJAX call to clear cart
        fetch('/api/cart/clear', {
            method: 'POST'
        }).then(response => {
            if(response.ok) {
                location.reload();
            }
        });
    }
}
</script>

</body>
</html>
