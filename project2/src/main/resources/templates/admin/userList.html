<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<link th:href="@{/css/bootstrap.css}" rel="stylesheet" />

<div layout:fragment="content">
	<table>
		<tr th:each="page:${pages}">
			<td><a th:href="|@{/hr/userInfo(id=${page.getId()})}|">[[${page.getId()}]]</a></td>
		</tr>
	</table>
	
	<a th:href="@{/hr/userList(page=1)}">첫 페이지</a>
	<a th:href="${pages.first} ? '#' : @{/hr/userList(page=${pages.number})}">이전</a>
	<span th:each="page:${#numbers.sequence(startPage, endPage)}">
		<span th:if="${page == pages.number + 1}" th:text="${page}"></span>
		<span th:unless="${page == pages.number + 1}">
			<a th:href="@{/hr/userList(page=${page})}" th:text="${page}"></a>
		</span>
	</span>
	<a th:href="${pages.last} ? '#' : @{/hr/userList(page=${pages.number+2})}">다음</a>
	<a th:href="@{/hr/userList(page=${pages.totalPages})}">마지막 페이지</a>
	
	<hr />	
</div>
