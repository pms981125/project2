<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<!-- [[${member}]] -->
<div layout:fragment="content">

	<form th:action="@{/user/update}" method="post" id="form">
		<input type="text" name="id" class="form-control" th:value="${#authentication.name}" readonly>
		<input type="hidden" name="password" class="form-control" th:value="${#authentication.principal.password}">
		<button class="btn btn-primary memUpdateBtn">정보 수정</button>
		<button class="btn btn-danger memWithdrawalBtn">회원 탈퇴</button>
	</form>
</div>

<script layout:fragment="script" th:inline="javascript">
	// const auth = /*[[${#authentication.principal.username}]]*/""
	// console.log(auth)

	const form = document.querySelector("#form")

	document.querySelector(".memUpdateBtn").addEventListener("click", function(e) {
	    e.preventDefault()
	    e.stopPropagation()
	    
	    form.action = `/user/update`
	    form.method = 'post'
	    form.submit()
	}, false)
	
	document.querySelector(".memWithdrawalBtn").addEventListener("click", function(e) {
	    e.preventDefault()
	    e.stopPropagation()
	    
	    form.action = `/user/withdrawal`
	    form.method = 'post'
	    form.submit()
	}, false)
</script>
